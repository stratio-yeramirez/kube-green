apiVersion: v1
kind: Namespace
metadata:
  name: keos-core
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-green-frontend
  namespace: keos-core
  labels:
    app: kube-green-frontend
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kube-green-frontend
  template:
    metadata:
      labels:
        app: kube-green-frontend
        component: frontend
    spec:
      containers:
      - name: frontend
        image: yeramirez/kube-front:0.7.9-frontend-d5d6c66
        imagePullPolicy: Always
        env:
        - name: API_SERVICE_NAME
          value: "kube-green-api-service.keos-core.svc.cluster.local"
        - name: API_SERVICE_PORT
          value: "8080"
        ports:
        - containerPort: 80
          name: http
          protocol: TCP
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: kube-green-frontend-service
  namespace: keos-core
  labels:
    app: kube-green-frontend
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  selector:
    app: kube-green-frontend
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kube-green-frontend-ingress
  namespace: keos-core
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: kube-green-frontend.keos-core.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: kube-green-frontend-service
            port:
              number: 80

